name: Validate plugin

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - 'scripts/validate-plugin.sh'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - 'scripts/validate-plugin.sh'
      - '.github/workflows/validate.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate manifests + skill frontmatter
        run: bash scripts/validate-plugin.sh
