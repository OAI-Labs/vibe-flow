name: Feature request
description: Propose a new skill, config field, or behaviour change.
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim the [docs](https://oai-labs.github.io/vibe-flow/)
        and existing issues — your idea may already be tracked.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution. "When I do X, Y is annoying because Z."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How would you like vibe-flow to behave? New skill? New config field? Change to existing skill?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New skill
        - Change to existing skill
        - New config field in .vibe-flow.yaml
        - Docs / examples
        - CI / release process
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Sketches, links, prior art.
